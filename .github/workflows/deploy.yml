name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# Amplify is configured with auto-build on push to main.
# This workflow exists as a record and for manual triggers.
# Amplify handles: build, deploy, CDN invalidation automatically.
# App: https://main.dl0i3qehr8gc6.amplifyapp.com
# App ID: dl0i3qehr8gc6

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy triggered
        run: echo "Push to main detected — Amplify will build and deploy automatically."
